<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }

        img {
            width: 250px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 40px;
            color: red;
            text-shadow: 0 0 10px red, 0 0 20px red;
            animation: fadeIn 3s ease-in-out;
        }

        p {
            font-size: 24px;
            color: yellow;
            animation: fadeIn 4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>
<body>

    <img src="angry.gif" alt="gif">

    <h1>Waste Fellow</h1>
    <p> Ayna memu chesina cake endhuku tintav le </p>
    <p>Hate youuuuuuuuuuuuuuuuuuuuuuuuuuuuuuu</p>

</body>
</html>
