<!DOCTYPE html>
<html>
<head>
    <title>I'm Sorry</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            text-align: center;

            /* 💗 Soft apology gradient */
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;

            color: #5a2a2a;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ✨ Floating hearts */
        body::before {
            content: "💗 💖 💕 💓 💞";
            position: absolute;
            font-size: 40px;
            opacity: 0.2;
            animation: floatHearts 15s linear infinite;
        }

        @keyframes floatHearts {
            from { transform: translateY(100vh); }
            to { transform: translateY(-100vh); }
        }

        img {
            width: 230px;
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* 💬 Typing text */
        .typing1 {
            font-size: 36px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid rgba(90,42,42,0.7);
            width: 0;
            animation: typing1 3s steps(30, end) forwards, blink 0.7s infinite;
        }

        .typing2 {
            font-size: 20px;
            margin-top: 15px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid rgba(90,42,42,0.7);
            width: 0;
            animation: typing2 4s steps(40, end) 3s forwards, blink 0.7s infinite;
        }

        @keyframes typing1 {
            from { width: 0 }
            to { width: 260px }
        }

        @keyframes typing2 {
            from { width: 0 }
            to { width: 420px }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        /* 💖 Glow effect */
        .typing1, .typing2 {
            text-shadow: 0 0 8px rgba(255, 182, 193, 0.6);
        }

    </style>

</head>
<body>

    <!-- 🎥 CHANGE THIS GIF -->
    <img src="sorry.gif" alt="sorry gif">

    <div class="typing1">I'm Really Sorry...</div>

    <div class="typing2">
        Nenu ala cheyyakudadhu... please forgive me 🥺
    </div>

</body>
</html>
