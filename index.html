<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;

            /* 🌈 Gradient background */
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a, #6a5acd);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;

            color: #f1f1f1;
        }

        /* 🌊 Gradient animation */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ✨ Floating particles */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.08;
            animation: moveParticles 20s linear infinite;
        }

        @keyframes moveParticles {
            from { transform: translate(0,0); }
            to { transform: translate(-200px,-200px); }
        }

        img {
            width: 220px;
            border-radius: 15px;
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* ⌨️ Typing effect */
        .typing1 {
            font-size: 34px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid rgba(255,255,255,0.7);
            width: 0;
            animation: typing1 3s steps(30, end) forwards, blink 0.7s infinite;
            z-index: 1;
        }

        .typing2 {
            font-size: 20px;
            margin-top: 10px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid rgba(255,255,255,0.7);
            width: 0;
            animation: typing2 4s steps(40, end) 3s forwards, blink 0.7s infinite;
            z-index: 1;
        }

        @keyframes typing1 {
            from { width: 0 }
            to { width: 300px }
        }

        @keyframes typing2 {
            from { width: 0 }
            to { width: 420px }
        }

        @keyframes blink {
            50% { border-color: transparent }
        }

        /* ✨ Soft glow */
        .typing1, .typing2 {
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

    </style>

</head>
<body>

    <img src="angry.gif" alt="my gif">

    <div class="typing1">Waste Fellow!! Pe</div>

    <div class="typing2">
        Ayna memu chesina cake endhuku tintav le 😤
    </div>

</body>
</html>
